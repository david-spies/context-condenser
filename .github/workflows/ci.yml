name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

    #  - name: Lint
     #   run: pnpm lint

      - name: Test
        run: pnpm test

  scan-self:
    name: LVM Self-Scan (Savings Report)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install & Build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Run LVM scan (JSON output for CI)
        run: |
          node packages/cli/dist/index.js scan . --json > lvm-report.json
          cat lvm-report.json

      - name: Upload savings report
        uses: actions/upload-artifact@v4
        with:
          name: lvm-efficiency-report
          path: lvm-report.json
